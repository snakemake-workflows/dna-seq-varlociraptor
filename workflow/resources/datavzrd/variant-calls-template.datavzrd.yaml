__use_yte__: true

name: ?f"Variant calls {wildcards.event}"

default-view: ?"overview" if input.variant_oncoprints else f"{params.groups[0]}"
max-in-memory-rows: 1500

__definitions__:
  - import os
  - import pandas as pd
  - |
    def read_file(path):
        return open(path, 'r').read()
  - |
    hgvs_content = f"""
      function(value, row) {{
        let hgvs_regex = /^(.+?):(.+)$/;
        // discard protein id
        let hgvs = value.match(hgvs_regex)[2].replace('%3D', '=');
        return hgvs
      }}
    """
  - |
    protein_id = f"""
      function(row) {{
        if ( typeof row.hgvsp !== 'undefined') {{
        let protein_id = row.hgvsp.split(':')[0]
        return protein_id
        }}
        return ``
      }}
    """
  - |
    empty_content = f"""
      function(row) {{
        return ""
      }}
    """
  - |
    spliceai_content = f"""
      function(value, row) {{
        if (value.length !== 0) {{
          let effect = (typeof row.spliceai_effect !== 'undefined' ) ? row.spliceai_effect : "";
          return `${{effect}}${{value}}`
        }} else {{
          return ``
        }}
      }}
    """
  - |
    make_popover = f"""
      function(value, row) {{
        if (value.length === 0) {{
          return ``
        }}
        const len = value.split(',').length;
        return `<span data-toggle="popover" data-content="${{value}}">${{len}}</span>`;
      }}
    """
  - |
    def make_inspect_link(alias):
        return f"""
          function link_obs(value, row) {{
            const base = "https://varlociraptor.github.io/varlociraptor-inspect/";
            const params = new URLSearchParams();
            params.append(`OBS_{alias}`, value);
            const afdKey = `{alias}: allele frequency distribution`;
            if (row[afdKey] !== undefined && row[afdKey] !== null && row[afdKey] !== "") {{
              const afdValue = row[afdKey].replace(/^\\(|\\)$/g, '').replace(/'/g, '').replace(/,\\s+/g, ',');
              if (afdValue && afdValue !== ".") {{
                params.append(`AFD_{alias}`, afdValue);
              }}
            }}
            Object.keys(row).forEach(key => {{
              if (key.startsWith("prob: ")) {{
                const event = "PROB_" + key.replace("prob: ", "").toUpperCase();
                const prob = parseFloat(row[key]);
                const phred = prob <= 0 ? Infinity : -10 * Math.log10(prob);
                params.append(event, phred);
              }}
            }});
            return `
              <a
                href="${{base}}?${{params}}"
                target="_blank"
                class="btn btn-sm btn-outline-secondary py-0 px-1"
                title="Open in varlociraptor-inspect"
              >
                <svg xmlns="http://www.w3.org/2000/svg"
                     width="14"
                     height="14"
                     fill="currentColor"
                     class="bi bi-bar-chart-fill"
                     viewBox="0 0 16 16">
                  <path d="M1 11a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1zm5-4a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v7a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1zm5-5a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1h-2a1 1 0 0 1-1-1z"/>
                </svg>
              </a>
            `;
          }}
        """
  - |
    if params.genebe_genome_build is not None:
      genebe_gene_url = f"https://genebe.net/gene/{params.genebe_genome_build}/{{value}}"
    else:
      genebe_gene_url = None

datasets:
  ?if input.variant_oncoprints:
    gene-oncoprint:
      path: ?input.gene_oncoprint
      separator: "\t"
      headers: ?len(params.group_annotations.columns) + 1
      links:
        gene details:
          column: symbol
          view: "overview-{value}"
    ?for label in params.labels.index.values:
      ?label:
        path: ?os.path.join(input.oncoprint_sorted_datasets, f"{label}.tsv")
        separator: "\t"
        headers: 2
    ?for gene, path in params.variant_oncoprints:
      ?f"variant-oncoprint-{gene}":
        path: ?path
        separator: "\t"
        headers: ?len(params.group_annotations.columns) + 1
        links:
          ?for group in params.groups:
            ?group:
              column: hgvsc
              table-row: ?f"{group}/hgvsc"
              optional: true

  ?for group, path in zip(params.groups, input.calls):
    ?group:
      path: ?path
      separator: "\t"

views:
  ?if input.gene_oncoprint:
    ?for view in ["gene-oncoprint"] + list(params.labels.index.values):
      __variables__:
        labels: ?params.group_annotations.columns.values.tolist() if view == "gene-oncoprint" else [view]
      ?"overview" if view == "gene-oncoprint" else f"by {view}":
        ?if view == "gene-oncoprint":
          desc: |
            Overview table showing all discovered variants in all samples. Use link
            button to jump to detail views for the respective genes.
        ?else:
          desc: |
            ?f"""
            Rows are sorted by their statistical dependency on {view}, which is determined by a 
            [Chi² test](https://en.wikipedia.org/wiki/Chi-squared_test)
            for categorical data and a [Brunner-Munzel test](https://en.wikipedia.org/wiki/Brunner_Munzel_Test)
            for numerical data.
            The corresponding p-value and Benjamini-Hochberg corrected FDR is shown in the last two columns.
            They represent the probability to observe an at least as strong dependency by chance.
            Rows with highest dependency are shown first.
            """
        dataset: ?view
        render-table:
          ?if labels:
            headers:
              ?for i, annotation in enumerate(labels):
                ?i + 1:
                  label: ?annotation
                  ellipsis: 0
                  plot:
                    heatmap:
                      ?if pd.api.types.is_numeric_dtype(params.group_annotations[annotation].infer_objects()):
                        scale: linear
                        color-scheme: viridis
                      ?else:
                        scale: ordinal
                        color-scheme: category20
                      legend:
                        title: ?f"{annotation}"
          columns:
            symbol:
              link-to-url:
                ensembl:
                  url: https://www.ensembl.org/Homo_sapiens/Gene/Summary?g={value}
                ?if genebe_gene_url:
                  GeneBe:
                    url: ?genebe_gene_url
            consequence:
              plot:
                heatmap:
                  scale: ordinal
                  color-scheme: category20
            ?for group in params.groups:
              ?group:
                plot:
                  heatmap:
                    scale: ordinal
                    color-scheme: paired
                    aux-domain-columns: ?list(params.groups)
                    legend:
                      title: variant
                ellipsis: 0
            p-value independence:
              optional: true
              spell:
                url: v1.6.0/stats/p-value
                with:
                  significance_threshold: 0.05
            FDR independence:
              optional: true
              spell:
                url: v1.6.0/stats/p-value
                with:
                  significance_threshold: 0.05

    ?for gene, path in params.variant_oncoprints:
      ?f"overview-{gene}":
        desc: ?f"Variants found in gene {gene}."
        dataset: ?f"variant-oncoprint-{gene}"
        hidden: true
        render-table:
          ?if params.group_annotations.columns.values.tolist():
            headers:
              ?for i, annotation in enumerate(params.group_annotations.columns.values):
                ?i + 1:
                  label: ?annotation
                  ellipsis: 0
                  plot:
                    heatmap:
                      ?if pd.api.types.is_numeric_dtype(params.group_annotations[annotation].infer_objects()):
                        scale: linear
                        color-scheme: viridis
                      ?else:
                        scale: ordinal
                        color-scheme: category20
                      legend:
                        title: ?f"{annotation}"
          columns:
            consequence:
              plot:
                heatmap:
                  scale: ordinal
                  color-scheme: category20
            ?for group in params.groups:
              ?group:
                plot:
                  heatmap:
                    scale: ordinal
                    color-scheme: paired
                    aux-domain-columns: ?list(params.groups)
                ellipsis: 0
            hgvsg:
              display-mode: hidden
            hgvsc:
              optional: true
            hgvsp:
              optional: true

  ?for group in params.groups:
    ?group:
      desc: |
        ?f"""
        Variant calls.\n{params.event_desc}\n
        SpliceAI scores are probabilities of a variant being splice-altering.\n
        AlphaMissense scores are classified as: likely benign (<0.34), ambiguous (0.34<=, <=0.564), likely pathogenic (>0.564).
        """
      dataset: ?group
      render-table:
        columns:
          symbol:
            link-to-url:
              ensembl:
                url: https://www.ensembl.org/Homo_sapiens/Transcript/Summary?t={feature}
              ?if genebe_gene_url:
                  GeneBe:
                    url: ?genebe_gene_url
          'clinical significance':
            optional: true
            spell:
              url: v1.2.2/med/clin-sig
          hgvsp:
            custom: ?hgvs_content
            optional: true
          hgvsc:
            custom: ?read_file(input.linkouts)
          vartype:
            display-mode: hidden
          impact:
            plot:
              heatmap:
                scale: ordinal
                domain:
                  - HIGH
                  - MODERATE
                  - LOW
                  - MODIFIER
                range:
                  - "#ec0000"
                  - "#ec5300"
                  - "#ec9b00"
                  - "#ecca00"
          consequence:
            plot:
              heatmap:
                color-scheme: category20
                scale: ordinal
          revel:
            optional: true
            plot:
              heatmap:
                scale: "linear"
                domain: [0.0, 1.0]
                range:
                  - white
                  - "#ff5555"
          "regex('.+: allele frequency$')":
            plot:
              ticks:
                scale: "linear"
                domain: [0.0, 1.0]
                aux-domain-columns:
                  - "regex('.+: allele frequency')"
                color:
                  scale: "linear"
                  domain: [0.0, 0.05, 0.0500000001, 1.0]
                  range:
                  - "#ffd6b3"
                  - "#ff7f0e"
                  - "#a8d2f0"
                  - "#1f77b4"
          "regex('.+: allele frequency distribution')":
            display-mode: hidden
          "regex('.+: read depth')":
            plot:
              ticks:
                scale: "linear"
                aux-domain-columns:
                  - "regex('.+: read depth')"
          "regex('prob: (?!artifact|absent)')":
            plot:
              heatmap:
                scale: linear
                domain: [0.0, 1.0]
                range:
                  - white
                  - "#1f77b4"
          "regex('prob: (artifact|absent)')":
            plot:
              heatmap:
                scale: linear
                domain: [0.0, 1.0]
                range:
                  - white
                  - "#d4322c"
          "gnomad genome af":
            optional: true
            plot:
              heatmap:
                scale: "linear"
                domain: [0.0, 0.01, 1.0]
                range:
                  - white
                  - "#adebad"
                  - "#29a329"
          gene:
            display-mode: hidden
          feature:
            display-mode: hidden
          binned max vaf:
            optional: true
            display-mode: hidden
          swissprot:
            optional: true
            display-mode: hidden
          hgvsg:
            display-mode: hidden
          chromosome:
            display-mode: detail
          end position:
            display-mode: detail
          position:
            display-mode: detail
          reference allele:
            display-mode: detail
            spell:
              url: v1.5.0/med/alleles
          alternative allele:
            display-mode: detail
            spell:
              url: v1.5.0/med/alleles
          protein position:
            display-mode: detail
          protein alteration (short):
            display-mode: detail
          canonical:
            optional: true
            display-mode: detail
            spell:
              url: v1.2.2/logic/boolean
              with:
                true_value: "True"
                false_value: "False"
          mane_plus_clinical:
            optional: true
            display-mode: detail
            spell:
              url: v1.2.2/logic/boolean
              with:
                true_value: "True"
                false_value: "False"
          ?for alias in params.samples.loc[params.samples["group"] == group, "alias"]:
            '?f"{alias}: observations"':
              optional: true
              custom: ?make_inspect_link(alias)
              display-mode: normal
            '?f"{alias}: short observations"':
              optional: true
              display-mode: hidden
          spliceai:
            optional: true
            plot:
              heatmap:
                scale: "linear"
                domain: [0.0, 0.2, 0.5, 0.8, 1.0]
                range:
                  - "#ffffff"
                  - "#f9f7ae"
                  - "#fcac63"
                  - "#f16e43"
                  - "#d4322c"
                custom-content: ?spliceai_content
          spliceai_effect:
            optional: true
            display-mode: hidden
          alphamissense:
            optional: true
            plot:
              heatmap:
                scale: "linear"
                domain: [0.0, 0.34, 0.564, 1.0]
                range:
                  - "#22964"
                  - "#d7ee82"
                  - "#fedd8e"
                  - "#d4322c"
          population:
            optional: true
            custom: ?make_popover
        add-columns:
          build:
            value: ?f"function() {{ return `{params.build}` }}"
            display-mode: hidden
          ensembl_protein_id:
            value: ?protein_id
            display-mode: detail
